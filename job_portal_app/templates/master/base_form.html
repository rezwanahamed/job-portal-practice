{% extends 'master/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<h3>{{ form_title }}</h3>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{form | crispy}}
  <button type="submit" class="btn btn-primary">{{ form_button }}</button>
</form>
{% endblock content %}
